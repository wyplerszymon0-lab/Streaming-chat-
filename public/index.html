<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 16px 24px; border-bottom: 1px solid #222; font-weight: 600; letter-spacing: 1px; color: #888; font-size: 12px; text-transform: uppercase; }
  #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .message { max-width: 720px; line-height: 1.6; }
  .message.user { align-self: flex-end; background: #1a1a2e; padding: 12px 16px; border-radius: 12px 12px 2px 12px; color: #a5b4fc; }
  .message.assistant { align-self: flex-start; color: #e5e5e5; }
  .message.assistant .cursor { display: inline-block; width: 2px; height: 16px; background: #a5b4fc; margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  #form { padding: 16px 24px; border-top: 1px solid #222; display: flex; gap: 12px; }
  #input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e5e5e5; font-size: 15px; outline: none; }
  #input:focus { border-color: #555; }
  #send { padding: 12px 24px; background: #4f46e5; border: none; border-radius: 8px; color: white; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  #send:hover { background: #4338ca; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div id="header">⚡ Streaming Chat</div>
<div id="messages"></div>
<div id="form">
  <input id="input" placeholder="Type a message..." autocomplete="off">
  <button id="send">Send</button>
</div>
<script>
  const messages = document.getElementById("messages");
  const input    = document.getElementById("input");
  const sendBtn  = document.getElementById("send");
  const SESSION  = "session-" + Math.random().toString(36).slice(2);

  function addMessage(role, text = "") {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    if (role === "assistant") {
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      div.appendChild(cursor);
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    sendBtn.disabled = true;

    addMessage("user", text);
    const aiDiv = addMessage("assistant");
    const cursor = aiDiv.querySelector(".cursor");
    let content = "";

    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, sessionId: SESSION }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split("\n\n");
      buffer = parts.pop();

      for (const part of parts) {
        const lines = part.split("\n");
        const eventLine = lines.find(l => l.startsWith("event: "));
        const dataLine  = lines.find(l => l.startsWith("data: "));
        if (!eventLine || !dataLine) continue;

        const event = eventLine.slice(7).trim();
        const data  = JSON.parse(dataLine.slice(6).trim());

        if (event === "token") {
          content += data.token;
          aiDiv.textContent = content;
          aiDiv.appendChild(cursor);
          messages.scrollTop = messages.scrollHeight;
        }

        if (event === "done" || event === "error") {
          cursor.remove();
          sendBtn.disabled = false;
          input.focus();
        }
      }
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); });
  input.focus();
</script>
</body>
</html>
